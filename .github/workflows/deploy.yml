name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 108209429292.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          cd app
          docker build -t url-shortener .
          docker tag url-shortener:latest 108209429292.dkr.ecr.ap-south-1.amazonaws.com/url-shortener:latest
          docker push 108209429292.dkr.ecr.ap-south-1.amazonaws.com/url-shortener:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.BASTION_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ssh -i ~/.ssh/aws-3tier.pem ubuntu@10.0.2.26 "
              aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 108209429292.dkr.ecr.ap-south-1.amazonaws.com
              docker pull 108209429292.dkr.ecr.ap-south-1.amazonaws.com/url-shortener:latest
              docker stop url-app || true
              docker rm url-app || true
              docker run -d -p 80:80 --name url-app 108209429292.dkr.ecr.ap-south-1.amazonaws.com/url-shortener:latest
            "